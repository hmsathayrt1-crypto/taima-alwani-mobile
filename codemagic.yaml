workflows:
  android-apk:
    name: Build Android APK
    max_build_duration: 15
    instance_type: mac_mini_m2
    
    environment:
      node: v22
      
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    
    scripts:
      - name: Install dependencies
        script: |
          npm install
          
      - name: Fetch web assets
        script: |
          mkdir -p dist
          curl -L -o dist/index.html https://taima-alwani.pages.dev/index.html || true
          
      - name: Initialize Capacitor Android
        script: |
          npx cap add android || true
          npx cap sync android
          
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleDebug
          
    artifacts:
      - android/app/build/outputs/**/*.apk
      
    publishing:
      email:
        recipients:
          - Hmsathayrt1@gmail.com
        notify:
          success: true
          failure: true
